# Skill-Creator Manifest
# Defines all files required for installation and their metadata

skill:
  name: skill-creator
  version: 1.0.0
  description: Tools and docs to install, validate, update, and manage OpenCode skills
  repository: https://github.com/JValdivia23/opencode-skill-creator
  license: MIT
  
source:
  # Base URL for raw GitHub content
  base_url: https://raw.githubusercontent.com/JValdivia23/opencode-skill-creator/main
  
  # All files required for the skill (relative to skills/skill-creator/)
  files:
    - SKILL.md
    - references/installation-guide.md
    - references/troubleshooting.md
    - references/claude-adaptation.md
    - references/templates/basic-skill.md
    - references/templates/full-skill.md

installation:
  # Where the skill should be installed
  path_prefix:
    local: .opencode/skills/skill-creator
    global: ~/.config/opencode/skills/skill-creator
  
  # Files that must exist after installation
  required:
    - SKILL.md
  
  # Validation checks
  validation:
    - frontmatter_required: [name, description]
    - name_matches_directory: true

metadata:
  author: JValdivia23
  min_opencode_version: "0.1.0"
  tags: [skill-management, installation, validation]
