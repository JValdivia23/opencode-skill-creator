name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate bundled skill
        run: python3 ./scripts/validate-skill.py ./skills/skill-creator

      - name: Installer dry run against Claude PDF skill
        run: |
          python3 ./scripts/install-skill-from-github.py \
            --url "https://github.com/anthropics/skills/tree/main/skills/pdf" \
            --scope local \
            --dry-run
